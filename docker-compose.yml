x-backend-env: &backend-env
  APP_HOST: ${APP_HOST:-0.0.0.0}
  APP_PORT: ${APP_PORT:-8000}
  APP_ENV: ${APP_ENV:-production}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-remote_control}
  POSTGRES_USER: ${POSTGRES_USER:-rc_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_to_strong_random_secret}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  JWT_REFRESH_TOKEN_EXPIRE_HOURS: ${JWT_REFRESH_TOKEN_EXPIRE_HOURS:-8}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
  LDAP_SERVER: ${LDAP_SERVER:-ldap://ldap.corp.local}
  LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=corp,DC=local}
  LDAP_BIND_DN: ${LDAP_BIND_DN:-CN=svc-remote,OU=ServiceAccounts,DC=corp,DC=local}
  LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-change_me}
  TURN_SERVER: ${TURN_SERVER:-turn:turn.corp.local:3478}
  TURN_USERNAME: ${TURN_USERNAME:-remote_user}
  TURN_PASSWORD: ${TURN_PASSWORD:-change_me}
  VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://remote.corp.local/api}
  VITE_WS_URL: ${VITE_WS_URL:-wss://remote.corp.local}

services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    environment: *backend-env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  coturn:
    image: coturn/coturn:alpine
    network_mode: host
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A app.notifications.tasks:celery_app worker --loglevel=info
    environment: *backend-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
