name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release token
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -n "${RELEASE_PLEASE_TOKEN}" ]]; then
            echo "Using RELEASE_PLEASE_TOKEN for release-please."
            exit 0
          fi

          echo "::error title=Missing RELEASE_PLEASE_TOKEN::release-please cannot create PRs with the current repository settings unless you enable 'Allow GitHub Actions to create and approve pull requests'. Configure the RELEASE_PLEASE_TOKEN secret with a PAT, or enable that repository setting before rerunning this workflow."
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Create or update release PR
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          npx --yes release-please@17.1.3 release-pr \
            --token="${RELEASE_PLEASE_TOKEN}" \
            --repo-url="${GITHUB_REPOSITORY}" \
            --target-branch="${GITHUB_REF_NAME}" \
            --config-file="release-please-config.json" \
            --manifest-file=".release-please-manifest.json"

      - name: Create GitHub release when a release PR was merged
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          npx --yes release-please@17.1.3 github-release \
            --token="${RELEASE_PLEASE_TOKEN}" \
            --repo-url="${GITHUB_REPOSITORY}" \
            --target-branch="${GITHUB_REF_NAME}" \
            --config-file="release-please-config.json" \
            --manifest-file=".release-please-manifest.json"
