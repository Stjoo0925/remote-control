# coturn TURN/STUN 서버 설정
# 사내망과 인터넷 모두 지원합니다.

listening-port=3478
tls-listening-port=5349

# ─── 공개 IP 설정 (인터넷 배포 필수) ───────────────────────────────────
# 서버의 공인 IP를 입력하세요.
# 형식: external-ip=<공인IP>/<내부IP>  (NAT 환경)
#       external-ip=<공인IP>            (직접 연결)
# 예시:
# external-ip=203.0.113.10
# external-ip=203.0.113.10/10.0.0.5
#
# 환경변수로 주입하려면 docker-compose에서:
#   command: ["--external-ip=${TURN_PUBLIC_IP}"]
# 로 설정하세요.
# external-ip=YOUR_PUBLIC_IP_HERE

# ─── 도메인 ──────────────────────────────────────────────────────────────
# 사내 전용: realm=corp.local
# 인터넷 공개: 실제 도메인으로 변경 (예: realm=remote.example.com)
realm=remote.example.com
server-name=turn.remote.example.com

# ─── 인증 ────────────────────────────────────────────────────────────────
use-auth-secret
static-auth-secret=changeme_strong_secret

# ─── 로그 ────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
verbose

# ─── 보안 ────────────────────────────────────────────────────────────────
# 멀티캐스트 피어 차단 (항상 유지)
no-multicast-peers

# 루프백 및 링크-로컬 릴레이 차단 (SSRF 방지)
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
denied-peer-ip=169.254.0.0-169.254.255.255

# 주의: 사내 전용으로 제한하려면 아래 주석 해제
# denied-peer-ip=0.0.0.0-0.255.255.255
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255

# ─── TLS (인터넷 배포 권장) ──────────────────────────────────────────────
# Let's Encrypt 또는 CA 인증서 경로를 설정하세요.
# cert=/etc/coturn/ssl/fullchain.pem
# pkey=/etc/coturn/ssl/privkey.pem

# ─── 릴레이 포트 범위 ────────────────────────────────────────────────────
# 방화벽에서 이 포트 범위(UDP/TCP)를 열어야 합니다.
min-port=49152
max-port=65535

# ─── 연결 제한 ───────────────────────────────────────────────────────────
# 서버 부하 방지를 위한 동시 세션 제한
max-bps=0
total-quota=100
bps-capacity=0
