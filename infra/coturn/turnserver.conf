# coturn TURN/STUN 서버 설정 (사내 전용)

listening-port=3478
tls-listening-port=5349

# 사내 서버 IP로 변경 필요
# external-ip=192.168.1.100

realm=corp.local
server-name=turn.corp.local

# 인증
use-auth-secret
static-auth-secret=changeme_strong_secret

# 로그
log-file=/var/log/coturn/turnserver.log
verbose

# 보안: 사내 IP만 릴레이 허용
# allowed-peer-ip=192.168.0.0-192.168.255.255
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=128.0.0.0-191.255.255.255

# TLS (사내 CA 인증서)
# cert=/etc/coturn/ssl/server.crt
# pkey=/etc/coturn/ssl/server.key
